# ----- Data Pipeline -----
data:
  lookback_days: 90
  stock_interval: "1d"
  request_timeout_seconds: 30
  max_retries: 3
  retry_delay_seconds: 5

# ----- Cache TTLs (hours) -----
cache:
  comtrade_ttl_hours: 168
  fred_ttl_hours: 24
  worldbank_ttl_hours: 168
  freight_ttl_hours: 24
  ais_ttl_hours: 6
  stocks_ttl_hours: 1

# ----- Decision Engine -----
engine:
  weights:
    trade_flow_score: 0.30
    freight_rate_score: 0.25
    congestion_score: 0.20
    macro_score: 0.15
    momentum_score: 0.10

  insight_min_score: 0.55
  high_demand_threshold: 0.70
  low_demand_threshold: 0.35

  port_demand_weights:
    trade_flow: 0.40
    congestion: 0.35
    throughput: 0.25

  route_weights:
    rate_momentum: 0.35
    demand_imbalance: 0.30
    congestion_clearance: 0.20
    macro_tailwind: 0.15

  macro_weights:
    pmi: 0.40
    bdi: 0.35
    fuel_inverse: 0.25

  correlation:
    min_window_days: 60
    min_abs_correlation: 0.40
    lag_days_to_test: [0, 7, 14, 21, 30]
  # Commodity signal hypotheses:
  # DBA rises → agriculture exports surge → SBLK/GOGL demand increases
  # DBB rises → industrial metals shipping increases → BDI leads
  # USO rises → shipping costs increase (fuel) → margin compression → inverse ZIM
  # XLB rises → materials demand → port throughput increases

# ----- Logging -----
logging:
  level: "INFO"
  log_dir: "logs"
  rotation: "daily"
  retention_days: 14

# ----- External API Keys -----
# Keys are loaded from Streamlit Secrets or environment variables.
# See .streamlit/secrets.toml.example for setup instructions.
#
# NewsAPI (https://newsapi.org):
#   Free tier: 100 requests/day, articles from last 30 days
#   Set: NEWS_API_KEY in Streamlit Secrets
#
# Alpha Vantage (https://alphavantage.co):
#   Free tier: 25 requests/day, 5 requests/minute
#   Set: ALPHA_VANTAGE_KEY in Streamlit Secrets
#
# FRED API (https://fred.stlouisfed.org/docs/api):
#   Free, unlimited
#   Set: FRED_API_KEY in Streamlit Secrets
