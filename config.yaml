# ----- Shipping Stocks & ETFs -----
shipping_stocks:
  - ZIM    # Zim Integrated Shipping
  - MATX   # Matson
  - SBLK   # Star Bulk Carriers
  - DAC    # Danaos Corporation
  - CMRE   # Costamare

sector_etfs:
  - XRT    # SPDR S&P Retail ETF (consumer demand proxy)
  - XLI    # Industrial Select SPDR (trade activity proxy)
  - XLB    # Materials Select SPDR (metals/chemicals demand)
  - DBA    # Invesco DB Agriculture Fund (ag commodity prices)
  - DBB    # Invesco DB Base Metals Fund (copper/zinc/aluminum)
  - USO    # United States Oil Fund (fuel cost proxy)

# Additional shipping-focused stocks (beyond main 5)
shipping_stocks_extended:
  - GOGL   # Golden Ocean Group (dry bulk)
  - DSX    # Diana Shipping
  - NMM    # Navios Maritime Partners
  - ATCO   # Atlas Corp (container leasing)

