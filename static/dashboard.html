<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShipTracker Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #ffffff; color: #111827; }
    .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }

    /* Scrollable panels */
    #table-panel { overflow-y: auto; }
    #signals-panel { overflow-y: auto; }

    /* Sticky table header */
    #vessel-table thead th { position: sticky; top: 0; background: #ffffff; z-index: 10; }

    /* Row expansion animation */
    .expansion-cell { padding: 0 !important; border: none !important; }
    .expansion-inner {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.22s ease-out;
    }
    .expansion-inner.open {
      max-height: 320px;
      transition: max-height 0.28s ease-in;
    }

    /* Focus ring */
    :focus-visible { outline: 2px solid #3b82f6; outline-offset: 1px; }

    /* Skeleton pulse */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .skeleton-pulse { animation: pulse 1.4s cubic-bezier(0.4,0,0.6,1) infinite; }

    /* Dropdown panel */
    .dropdown-panel {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 50;
      background: #ffffff;
      border: 1px solid #E5E7EB;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      min-width: 180px;
      padding: 4px 0;
      display: none;
    }
    .dropdown-panel.open { display: block; }
    .dropdown-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 6px 14px;
      font-size: 12px;
      color: #374151;
      cursor: pointer;
      background: none;
      border: none;
      white-space: nowrap;
    }
    .dropdown-item:hover { background: #F9FAFB; }
    .dropdown-item.selected { color: #1d4ed8; font-weight: 500; }

    /* Sort arrow styling */
    .sort-arrow { font-size: 10px; margin-left: 3px; color: #9ca3af; cursor: pointer; user-select: none; }
    .sort-arrow.active { color: #374151; }

    /* Pill */
    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      background: #F3F4F6;
      border: 1px solid #E5E7EB;
      padding: 2px 8px;
      border-radius: 2px;
      color: #374151;
    }
    .pill-remove {
      cursor: pointer;
      color: #6b7280;
      font-size: 13px;
      line-height: 1;
      background: none;
      border: none;
      padding: 0 0 0 2px;
    }
    .pill-remove:hover { color: #111827; }

    /* Signal card */
    .signal-row {
      padding: 8px 12px;
      border-bottom: 1px solid #F3F4F6;
      cursor: default;
      transition: background 0.1s;
    }
    .signal-row:hover { background: #F9FAFB; }

    /* Pagination button */
    .pg-btn {
      padding: 2px 10px;
      font-size: 11px;
      border: 1px solid #E5E7EB;
      background: #ffffff;
      color: #374151;
      cursor: pointer;
      border-radius: 2px;
    }
    .pg-btn:hover:not(:disabled) { background: #F9FAFB; }
    .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Table row hover */
    #vessel-table tbody tr.data-row:hover { background: #F9FAFB; }
    #vessel-table tbody tr.data-row { cursor: pointer; }

    /* Header fixed */
    #app-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      background: #ffffff;
      border-bottom: 1px solid #E5E7EB;
    }
    #pills-bar {
      position: fixed;
      top: 41px;
      left: 0;
      right: 0;
      z-index: 39;
      background: #ffffff;
      border-bottom: 1px solid #F3F4F6;
    }
    #main-layout {
      display: flex;
      height: calc(100vh - 41px);
    }
    #main-layout.with-pills {
      height: calc(100vh - 41px - 34px);
    }
  </style>
</head>
<body class="text-gray-900">

<!-- ══════════════════════════════════════════
     MAIN LAYOUT
══════════════════════════════════════════ -->
<div id="layout-offset" style="height:41px;"></div>
<div id="pills-offset" style="height:0px;"></div>

<div id="main-layout" style="display:flex; height:calc(100vh - 41px);">

  <!-- LEFT: Shipping Table (60%) -->
  <div id="table-panel" style="width:60%; border-right:1px solid #E5E7EB; display:flex; flex-direction:column; overflow:hidden;">

    <!-- Section label -->
    <div style="padding:10px 16px 8px; border-bottom:1px solid #E5E7EB; flex-shrink:0;">
      <span style="font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#6B7280;">Vessel Movements</span>
    </div>

    <!-- Table wrapper -->
    <div style="flex:1; overflow-y:auto; overflow-x:auto;">
      <table id="vessel-table" style="width:100%; border-collapse:collapse; font-size:11px;">
        <thead>
          <tr style="border-bottom:1px solid #E5E7EB;">
            <th scope="col" style="text-align:left;padding:7px 8px 7px 16px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#6B7280;white-space:nowrap;">
              Vessel Name
              <span class="sort-arrow" id="sort-name" onclick="sortBy('name')" title="Sort by vessel name">↑↓</span>
            </th>
            <th scope="col" style="text-align:left;padding:7px 8px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#6B7280;white-space:nowrap;">
              IMO
              <span class="sort-arrow" id="sort-imo" onclick="sortBy('imo')" title="Sort by IMO">↑↓</span>
            </th>
            <th scope="col" style="text-align:left;padding:7px 8px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#6B7280;white-space:nowrap;">
              Position
              <span class="sort-arrow" id="sort-position" onclick="sortBy('position')" title="Sort by position">↑↓</span>
            </th>
            <th scope="col" style="text-align:left;padding:7px 8px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#6B7280;white-space:nowrap;">
              Origin
              <span class="sort-arrow" id="sort-origin" onclick="sortBy('origin')" title="Sort by origin">↑↓</span>
            </th>
            <th scope="col" style="text-align:left;padding:7px 8px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#6B7280;white-space:nowrap;">

            </th>
            <th scope="col" style="text-align:left;padding:7px 8px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#6B7280;white-space:nowrap;">

    <!-- Section label + sort toggle -->

    <!-- Signals list -->
    <div id="signals-list" style="flex:1;overflow-y:auto;">
      <!-- Rendered by JS -->
    </div>
  </div>

</div>

══════════════════════════════════════════ -->
<footer style="position:fixed;bottom:0;left:0;right:0;background:#ffffff;border-top:1px solid #E5E7EB;padding:6px 16px;display:flex;align-items:center;justify-content:space-between;z-index:30;">

</footer>

<!-- Footer spacer -->
<div style="height:36px;"></div>

<!-- ══════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════ -->
<script>
'use strict';

// ── Configuration ──────────────────────────────────────────────────────────
const SKELETON_DURATION_MS = 800;
const PAGE_SIZE = 20;

// ── State ──────────────────────────────────────────────────────────────────
const state = {
  filters: {},
  sortCol: null,
  sortDir: 'asc',
  page: 1,
  expandedRow: null,
  signalSortDir: 'desc',
  loading: true
};

// ── Vessel Data (50 vessels) ────────────────────────────────────────────────
const vessels = [
  {
    name: 'MSC Gülsün',
    imo: '9839430',
    position: '35.2°N 12.8°E',
    origin: 'Shanghai',
    destination: 'Rotterdam',
    eta: '2026-03-28',
    cargo: 'Electronics',
    status: 'IN TRANSIT',
    vesselType: 'Container Ship',
    tradeRoute: 'Asia-Europe',
    commodity: 'Electronics',
    lastPort: 'Port Said',
    nextPort: 'Algeciras',
    speed: '19.4',

// ── Clock ───────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const str = `${now.getUTCFullYear()}-${pad(now.getUTCMonth()+1)}-${pad(now.getUTCDate())} `
    + `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())} UTC`;
  document.getElementById('live-clock').textContent = str;
  document.getElementById('footer-timestamp').textContent = `Last updated: ${str}`;
}
updateClock();
setInterval(updateClock, 1000);

// ── Sort helpers ────────────────────────────────────────────────────────────
function sortBy(col) {
  if (state.sortCol === col) {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    state.sortCol = col;
    state.sortDir = 'asc';
  }
  state.page = 1;
  updateSortArrows();
  renderTable();
}

function updateSortArrows() {
  const cols = ['name','imo','position','origin','destination','eta','cargo','status'];
  cols.forEach(c => {
    const el = document.getElementById('sort-' + c);
    if (!el) return;
    if (state.sortCol === c) {
      el.textContent = state.sortDir === 'asc' ? '↑' : '↓';
      el.classList.add('active');
    } else {
      el.textContent = '↑↓';
      el.classList.remove('active');
    }
  });
}

// ── Filter helpers ──────────────────────────────────────────────────────────
function applyFilter(key, value) {
  if (value === '' || value === null || value === undefined) {
    delete state.filters[key];
  } else {
    state.filters[key] = value;
  }
  state.page = 1;
  state.expandedRow = null;
  renderPills();
  renderTable();
  updateDropdownLabels();
  updateDropdownSelectedStates();
}

function removeFilter(key) {
  delete state.filters[key];
  state.page = 1;
  state.expandedRow = null;
  renderPills();
  renderTable();
  updateDropdownLabels();
  updateDropdownSelectedStates();
}

function clearAllFilters() {
  state.filters = {};
  state.page = 1;
  state.expandedRow = null;
  renderPills();
  renderTable();
  updateDropdownLabels();
  updateDropdownSelectedStates();
}

function updateDropdownLabels() {
  const defaultLabels = {
    vesselType: 'Vessel Type',
    tradeRoute: 'Trade Route',
    origin: 'Port of Origin',
    destination: 'Destination Port',
    commodity: 'Commodity Class',
    timeRange: 'Time Range'
  };
  Object.keys(defaultLabels).forEach(key => {
    const btn = document.querySelector(`[data-key="${key}"].dropdown-trigger`);
    if (!btn) return;
    const label = btn.querySelector('.dd-label');
    if (!label) return;
    if (state.filters[key]) {
      label.textContent = state.filters[key];
      label.style.color = '#111827';
    } else {
      label.textContent = defaultLabels[key];
      label.style.color = '#374151';
    }
  });
}

function updateDropdownSelectedStates() {
  document.querySelectorAll('.dropdown-item').forEach(item => {
    const key = item.dataset.key;
    const value = item.dataset.value;
    const activeVal = state.filters[key] || '';
    item.classList.toggle('selected', value === activeVal);
  });
}

// ── Filter vessels ──────────────────────────────────────────────────────────
function getFilteredVessels() {
  let result = vessels.slice();

  if (state.filters.vesselType) {
    result = result.filter(v => v.vesselType === state.filters.vesselType);
  }
  if (state.filters.tradeRoute) {
    result = result.filter(v => v.tradeRoute === state.filters.tradeRoute);
  }
  if (state.filters.origin) {
    result = result.filter(v => v.origin === state.filters.origin);
  }
  if (state.filters.destination) {
    result = result.filter(v => v.destination === state.filters.destination);
  }
  if (state.filters.commodity) {
    result = result.filter(v => v.commodity === state.filters.commodity);
  }
  // timeRange is display-only (no date fields on vessels to filter by)

  if (state.sortCol) {
    const col = state.sortCol;
    result.sort((a, b) => {
      const av = (a[col] || '').toString().toLowerCase();
      const bv = (b[col] || '').toString().toLowerCase();
      if (av < bv) return state.sortDir === 'asc' ? -1 : 1;
      if (av > bv) return state.sortDir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  return result;
}

// ── Status styling ──────────────────────────────────────────────────────────
function statusStyle(status) {
  switch (status) {
    case 'IN TRANSIT':     return 'color:#374151';
    case 'DELAYED':        return 'color:#DC2626';
    case 'AT PORT':        return 'color:#2563EB';
    case 'AWAITING BERTH': return 'color:#D97706';
    case 'DEPARTED':       return 'color:#9CA3AF';
    default:               return 'color:#374151';
  }
}

function renderSkeleton() {
  const tbody = document.getElementById('vessel-tbody');
  let html = '';
  for (let i = 0; i < PAGE_SIZE; i++) {
    html += `<tr style="border-bottom:1px solid #F3F4F6;">`;
    const widths = [120, 72, 90, 80, 88, 72, 72, 80];
    widths.forEach(w => {
      html += `<td style="padding:8px 8px;"><div class="skeleton-pulse" style="height:10px;width:${w}px;background:#E5E7EB;border-radius:2px;"></div></td>`;
    });
    html += `</tr>`;
  }
  tbody.innerHTML = html;
  document.getElementById('pagination-info').textContent = '';
  document.getElementById('pg-num').textContent = '';
  document.getElementById('pg-prev').disabled = true;
  document.getElementById('pg-next').disabled = true;
}

// ── Table render ────────────────────────────────────────────────────────────
function renderTable() {
  if (state.loading) return;

  const filtered = getFilteredVessels();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (state.page > totalPages) state.page = totalPages;

  const start = (state.page - 1) * PAGE_SIZE;
  const end = Math.min(start + PAGE_SIZE, total);
  const pageVessels = filtered.slice(start, end);

  const tbody = document.getElementById('vessel-tbody');
  let html = '';

  pageVessels.forEach((v, idx) => {
    const globalIdx = start + idx;
    const isExpanded = state.expandedRow === v.imo;
    const trStyle = isExpanded ? 'background:#F9FAFB;' : '';

    html += `
      <tr
        class="data-row"
        style="border-bottom:1px solid #F3F4F6;${trStyle}"
        tabindex="0"
        data-imo="${v.imo}"
        aria-expanded="${isExpanded}"
        onclick="expandRow('${v.imo}')"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();expandRow('${v.imo}')}"
        role="button"
        aria-label="Vessel ${v.name}, IMO ${v.imo}. Click to expand details."
      >
        <td style="padding:7px 8px 7px 16px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;font-weight:500;color:#111827;" title="${v.name}">${v.name}</td>
        <td style="padding:7px 8px;font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;white-space:nowrap;">${v.imo}</td>
        <td style="padding:7px 8px;font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;white-space:nowrap;">${v.position}</td>
        <td style="padding:7px 8px;font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;white-space:nowrap;">${v.origin}</td>
        <td style="padding:7px 8px;font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;white-space:nowrap;">${v.destination}</td>
        <td style="padding:7px 8px;font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;white-space:nowrap;">${v.eta}</td>
        <td style="padding:7px 8px;font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;white-space:nowrap;">${v.cargo}</td>
        <td style="padding:7px 8px;font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;${statusStyle(v.status)}">${v.status}</td>
      </tr>
      <tr class="expansion-row" style="border-bottom:${isExpanded?'1px solid #E5E7EB':'none'};">
        <td class="expansion-cell" colspan="8">
          <div class="expansion-inner${isExpanded?' open':''}">
            <div style="padding:10px 16px 10px 16px;background:#F9FAFB;border-top:1px solid #F3F4F6;">
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px 24px;">
                <div>
                  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:2px;">Last Port</div>
                  <div style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;">${v.lastPort}</div>
                </div>
                <div>
                  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:2px;">Next Port</div>
                  <div style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;">${v.nextPort}</div>
                </div>
                <div>
                  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:2px;">Speed</div>
                  <div style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;">${v.speed} kn</div>
                </div>
                <div>
                  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:2px;">Draft</div>
                  <div style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;">${v.draft} m</div>
                </div>
                <div>
                  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:2px;">Flag</div>
                  <div style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;">${v.flag}</div>
                </div>
                <div>
                  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:2px;">Year Built</div>
                  <div style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;">${v.yearBuilt}</div>
                </div>
                <div>
                  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:2px;">Operator</div>
                  <div style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;">${v.operator}</div>
                </div>
                <div>
                  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:2px;">Agent</div>
                  <div style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;">${v.agent}</div>
                </div>
                <div>
                  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:2px;">Vessel Type</div>
                  <div style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;">${v.vesselType}</div>
                </div>
              </div>
              <div style="margin-top:8px;padding-top:8px;border-top:1px solid #E5E7EB;">
                <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;margin-bottom:2px;">Notes</div>
                <div style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;line-height:1.5;">${v.notes}</div>
              </div>
            </div>
          </div>
        </td>
      </tr>
    `;
  });

  if (pageVessels.length === 0) {
    html = `<tr><td colspan="8" style="padding:32px 16px;text-align:center;font-size:11px;color:#9CA3AF;">No vessels match the selected filters.</td></tr>`;
  }

  tbody.innerHTML = html;

  // Pagination info
  const showStart = total === 0 ? 0 : start + 1;
  const showEnd = end;
  document.getElementById('pagination-info').textContent =
    `Showing ${showStart}–${showEnd} of ${total} vessels`;
  document.getElementById('pg-num').textContent = `Page ${state.page} of ${totalPages}`;
  document.getElementById('pg-prev').disabled = state.page <= 1;
  document.getElementById('pg-next').disabled = state.page >= totalPages;
}

// ── Row expansion ───────────────────────────────────────────────────────────
function expandRow(imo) {
  if (state.expandedRow === imo) {
    state.expandedRow = null;
  } else {
    state.expandedRow = imo;
  }
  renderTable();
}

// ── Pagination ──────────────────────────────────────────────────────────────
function changePage(delta) {
  const filtered = getFilteredVessels();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  state.page = Math.max(1, Math.min(state.page + delta, totalPages));
  state.expandedRow = null;
  renderTable();
}

// ── Pills render ────────────────────────────────────────────────────────────
function renderPills() {
  const pillsBar = document.getElementById('pills-bar');
  const container = document.getElementById('pills-container');
  const pillsOffset = document.getElementById('pills-offset');
  const mainLayout = document.getElementById('main-layout');

  const active = Object.entries(state.filters);
  if (active.length === 0) {
    pillsBar.style.display = 'none';
    pillsOffset.style.height = '0px';
    mainLayout.style.height = 'calc(100vh - 41px)';
    return;
  }

  pillsBar.style.display = 'flex';
  pillsOffset.style.height = '34px';
  mainLayout.style.height = 'calc(100vh - 41px - 34px)';

  let html = '';
  active.forEach(([key, val]) => {
    const label = filterLabels[key] || key;
    html += `
      <span class="filter-pill">
        ${label}: ${val}
        <button
          class="pill-remove"
          aria-label="Remove ${label} filter"
          onclick="removeFilter('${key}')"
        >×</button>
      </span>
    `;
  });
  container.innerHTML = html;
}

// ── Signals render ──────────────────────────────────────────────────────────
function renderSignals() {
  const list = document.getElementById('signals-list');
  const sorted = signals.slice().sort((a, b) => {
    return state.signalSortDir === 'desc'
      ? b.confidence - a.confidence
      : a.confidence - b.confidence;
  });

  let html = '';
  sorted.forEach(s => {
    let dirStyle = '';
    if (s.direction === 'UP')      dirStyle = 'color:#15803d;font-weight:500;';
    else if (s.direction === 'DOWN') dirStyle = 'color:#DC2626;font-weight:500;';
    else                            dirStyle = 'color:#6B7280;font-weight:500;';

    html += `
      <div class="signal-row">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:3px;">
          <span style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:#111827;">${s.commodity}</span>
          <div style="display:flex;align-items:baseline;gap:12px;flex-shrink:0;margin-left:8px;">
            <span style="font-size:11px;text-transform:uppercase;letter-spacing:0.05em;${dirStyle}">${s.direction}</span>
            <span style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#374151;">${s.confidence}%</span>
          </div>
        </div>
        <div style="display:flex;align-items:baseline;justify-content:space-between;">
          <span style="font-size:11px;color:#6B7280;flex:1;padding-right:8px;line-height:1.4;">${s.basis}</span>
          <span style="font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#9CA3AF;flex-shrink:0;white-space:nowrap;">${s.horizon}</span>
        </div>
      </div>
    `;
  });
  list.innerHTML = html;
}

function toggleSignalSort() {
  state.signalSortDir = state.signalSortDir === 'desc' ? 'asc' : 'desc';
  const btn = document.getElementById('signal-sort-btn');
  btn.textContent = state.signalSortDir === 'desc'
    ? 'Sorted by confidence ↓'
    : 'Sorted by confidence ↑';
  renderSignals();
}

// ── Dropdown logic ──────────────────────────────────────────────────────────
function toggleDropdown(id) {
  const panel = document.getElementById(id);
  const isOpen = panel.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) {
    panel.classList.add('open');
    const btn = panel.previousElementSibling;
    if (btn) btn.setAttribute('aria-expanded', 'true');
    // Focus first item
    const first = panel.querySelector('.dropdown-item');
    if (first) first.focus();
  }
}

function closeAllDropdowns() {
  document.querySelectorAll('.dropdown-panel').forEach(p => {
    p.classList.remove('open');
  });
  document.querySelectorAll('.dropdown-trigger').forEach(b => {
    b.setAttribute('aria-expanded', 'false');
  });
}

// ── Event wiring ────────────────────────────────────────────────────────────
// Dropdown trigger clicks
document.querySelectorAll('.dropdown-trigger').forEach(btn => {
  const key = btn.dataset.key;
  const panelId = dropdownMap[key];
  btn.addEventListener('click', e => {
    e.stopPropagation();
    toggleDropdown(panelId);
  });
  btn.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleDropdown(panelId);
    }
    if (e.key === 'Escape') closeAllDropdowns();
  });
});

// Dropdown item clicks
document.querySelectorAll('.dropdown-item').forEach(item => {
  item.addEventListener('click', e => {
    e.stopPropagation();
    const key = item.dataset.key;
    const value = item.dataset.value;
    applyFilter(key, value);
    closeAllDropdowns();
  });
  item.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeAllDropdowns();
      const btn = document.querySelector(`.dropdown-trigger[data-key="${item.dataset.key}"]`);
      if (btn) btn.focus();
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const next = item.nextElementSibling;
      if (next) next.focus();
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      const prev = item.previousElementSibling;
      if (prev) prev.focus();
    }
  });
});

// Outside click closes dropdowns
document.addEventListener('click', () => closeAllDropdowns());
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAllDropdowns();
});

// ── Init ────────────────────────────────────────────────────────────────────
renderSkeleton();
renderSignals();
renderPills();

setTimeout(() => {
  state.loading = false;
  renderTable();
}, SKELETON_DURATION_MS);

</script>
